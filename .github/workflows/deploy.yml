name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - yzb-hd/**
      - yzb-qd/**
      - docker/**
      - scripts/**
      - .github/workflows/deploy.yml
  workflow_dispatch:
    inputs:
      skip_frontend:
        description: Skip frontend build
        type: boolean
        default: false
      skip_backend:
        description: Skip backend build
        type: boolean
        default: false

concurrency:
  group: deploy-prod
  cancel-in-progress: true

env:
  REMOTE_DIR: /home/yzb
  DEPLOY_DIR: /home/yzb/.deploy

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: ${{ !inputs.skip_backend }}
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
          cache-dependency-path: yzb-hd/pom.xml

      - name: Set up Node.js 20
        if: ${{ !inputs.skip_frontend }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: yzb-qd/package-lock.json

      - name: Install frontend dependencies
        if: ${{ !inputs.skip_frontend }}
        run: npm ci
        working-directory: yzb-qd

      - name: Build backend
        if: ${{ !inputs.skip_backend }}
        run: mvn -DskipTests package -B
        working-directory: yzb-hd

      - name: Build frontend
        if: ${{ !inputs.skip_frontend }}
        run: npm run build
        working-directory: yzb-qd

      - name: Package deployment artifacts
        run: |
          mkdir -p .deploy

          cp docker/docker-compose.yml .deploy/
          cp yzb-qd/nginx.conf .deploy/nginx.conf
          cp yzb-hd/sql/20260506_add_status_columns.sql .deploy/
          cp scripts/prod-remote-deploy.sh .deploy/remote-deploy.sh

          if [ -f yzb-hd/target/yzb.jar ]; then
            cp yzb-hd/target/yzb.jar .deploy/yzb.jar
          fi

          if [ -f yzb-hd/target/attachment-fix-patch.jar ]; then
            cp yzb-hd/target/attachment-fix-patch.jar .deploy/
          fi

          tar -czf .deploy/frontend-dist.tar.gz -C yzb-qd dist

          echo "--- Deployment package contents ---"
          ls -lh .deploy/

      - name: Ensure remote deploy directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          script: mkdir -p ${{ env.DEPLOY_DIR }}

      - name: Upload artifacts to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          source: .deploy/
          target: ${{ env.DEPLOY_DIR }}
          strip_components: 1
          overwrite: true
          tar_tmp_path: /tmp

      - name: Execute remote deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          script: |
            set -e
            echo "Fix line endings and make script executable"
            sed -i 's/\r$//' ${{ env.DEPLOY_DIR }}/remote-deploy.sh
            chmod +x ${{ env.DEPLOY_DIR }}/remote-deploy.sh

            echo "Run remote-deploy.sh on the server"
            cd ${{ env.REMOTE_DIR }}
            bash ${{ env.DEPLOY_DIR }}/remote-deploy.sh

      - name: Verify deployment
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          script: |
            echo "=== Container status ==="
            docker compose -f ${{ env.REMOTE_DIR }}/docker-compose.yml ps

            echo ""
            echo "=== Backend recent logs ==="
            docker logs --tail=30 yzbhc-backend

            echo ""
            echo "=== Nginx connectivity check ==="
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/ || echo "failed")
            echo "HTTP status: $STATUS"

            echo ""
            echo "=== Database unique_code column check ==="
            DB_PWD=$(docker inspect yzbhc-mysql --format '{{range .Config.Env}}{{println .}}{{end}}' | sed -n 's/^MYSQL_ROOT_PASSWORD=//p')
            HAS_COL=$(docker exec yzbhc-mysql mysql -uroot -p"$DB_PWD" -Nse "SELECT COUNT(*) FROM information_schema.columns WHERE table_schema='yzb' AND table_name='scm_inventory' AND column_name='unique_code'" 2>/dev/null)
            if [ "$HAS_COL" = "1" ]; then
              echo "unique_code column: OK"
            else
              echo "unique_code column: MISSING (migration may be needed)"
            fi

      - name: Notify on failure
        if: ${{ failure() }}
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          if [ -z "$DINGTALK_WEBHOOK" ]; then
            echo "DINGTALK_WEBHOOK not configured, skip notification"
            exit 0
          fi
          curl -s -X POST "$DINGTALK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"❌ 部署失败\",
                \"text\": \"### ❌ 部署失败\n\n- **仓库**: ${{ github.repository }}\n- **分支**: ${{ github.ref_name }}\n- **提交**: ${{ github.sha }}\n- **触发人**: ${{ github.triggering_actor }}\n- **时间**: $(date '+%Y-%m-%d %H:%M:%S')\n\n请查看 [Action 日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"
              }
            }"
