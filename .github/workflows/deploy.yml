name: Deploy to Production

on:
  push:
    branches: [main, master]
    paths:
      - yzb-hd/**
      - yzb-qd/**
      - docker/**
      - scripts/**
      - .github/workflows/deploy.yml
  workflow_dispatch:
    inputs:
      skip_frontend:
        description: Skip frontend build
        type: boolean
        default: false
      skip_backend:
        description: Skip backend build
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-prod
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  NGINX_IMAGE: ghcr.io/${{ github.repository }}/nginx
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: ${{ !inputs.skip_backend }}
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
          cache-dependency-path: yzb-hd/pom.xml

      - name: Set up Node.js 20
        if: ${{ !inputs.skip_frontend }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: yzb-qd/package-lock.json

      - name: Install frontend dependencies
        if: ${{ !inputs.skip_frontend }}
        run: npm ci
        working-directory: yzb-qd

      - name: Build backend
        if: ${{ !inputs.skip_backend }}
        run: mvn -DskipTests package -B
        working-directory: yzb-hd

      - name: Build frontend
        if: ${{ !inputs.skip_frontend }}
        run: npm run build
        working-directory: yzb-qd

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        if: ${{ !inputs.skip_backend }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Build and push nginx image
        if: ${{ !inputs.skip_frontend }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nginx.Dockerfile
          push: true
          tags: |
            ${{ env.NGINX_IMAGE }}:latest
            ${{ env.NGINX_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Generate docker-compose with correct images
        env:
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          NGINX_IMAGE: ${{ env.NGINX_IMAGE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          python3 - <<'PY'
          from textwrap import dedent
          import os
          
          image_tag = os.environ["IMAGE_TAG"]
          backend_image = os.environ["BACKEND_IMAGE"] + ":" + image_tag
          nginx_image = os.environ["NGINX_IMAGE"] + ":" + image_tag
          
          compose = dedent(f"""\
          services:
            mysql:
              image: mysql:8.0.45
              container_name: yzbhc-mysql
              restart: unless-stopped
              command:
                - --character-set-server=utf8mb4
                - --collation-server=utf8mb4_general_ci
                - --default-authentication-plugin=mysql_native_password
                - --lower_case_table_names=1
              environment:
                MYSQL_ROOT_PASSWORD: YzbhcRoot!2026@Prod#7Qm
                MYSQL_DATABASE: yzb
                MYSQL_USER: yzbhc_app
                MYSQL_PASSWORD: YzbhcApp!2026@Prod#9Lm
                TZ: Asia/Shanghai
              ports:
                - "33066:3306"
              volumes:
                - mysql_data:/var/lib/mysql
              healthcheck:
                test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
                interval: 10s
                timeout: 5s
                retries: 20
                start_period: 30s
          
            backend:
              image: {backend_image}
              container_name: yzbhc-backend
              restart: unless-stopped
              depends_on:
                mysql:
                  condition: service_healthy
              environment:
                SPRING_PROFILES_ACTIVE: pro
                SERVER_PORT: 8088
                DB_URL: "jdbc:mysql://mysql:3306/yzb?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
                DB_USERNAME: yzbhc_app
                DB_PASSWORD: YzbhcApp!2026@Prod#9Lm
                JASYPT_ENCRYPTOR_PASSWORD: YZB_PROD_MASTER_2026
                UPLOAD_PATH: /app/uploads/
                TZ: Asia/Shanghai
                JAVA_OPTS: -Xms512m -Xmx1024m
              ports:
                - "8088:8088"
              volumes:
                - backend_uploads:/app/uploads
          
            nginx:
              image: {nginx_image}
              container_name: yzbhc-nginx
              restart: unless-stopped
              depends_on:
                - backend
              ports:
                - "80:80"
          
          volumes:
            mysql_data:
            backend_uploads:
          """)
          
          with open("docker-compose.prod.yml", "w", encoding="utf-8") as f:
            f.write(compose)
          
          print("Generated docker-compose.prod.yml")
          PY

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Upload docker-compose and deploy
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USERNAME: ${{ secrets.DEPLOY_USERNAME }}
          PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          GHCR_TOKEN: ${{ secrets.GHCR_DEPLOY_TOKEN }}
          GHCR_USERNAME: ${{ github.repository_owner }}
        run: |
          set -e

          echo "--- Uploading docker-compose.prod.yml to server ---"
          sshpass -p "$PASSWORD" scp -o StrictHostKeyChecking=no docker-compose.prod.yml "$USERNAME@$HOST:/home/yzb/docker-compose.yml"
          echo "Upload successful"

          echo "--- Executing remote deployment ---"
          REMOTE_CMD='set -e; export DOCKER_CLIENT_TIMEOUT=600; export COMPOSE_HTTP_TIMEOUT=600; COMPOSE_FILE="/home/yzb/docker-compose.yml"; echo "--- Server connectivity check ---"; curl -fsSIL --max-time 10 https://ghcr.io/v2/ >/dev/null && echo "ghcr.io: OK" || echo "ghcr.io: FAILED (may cause slow pulls)"; if [ -n "$GHCR_TOKEN" ]; then echo "--- Logging in to GitHub Container Registry ---"; echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin; fi; echo "--- Pulling target images ---"; for i in 1 2 3; do echo "Pull attempt $i/3"; sudo docker compose -f "$COMPOSE_FILE" pull --quiet backend nginx && break || (echo "Pull failed, retrying..."; sleep 10); done; echo "--- Removing old backend/nginx containers ---"; sudo docker rm -f yzbhc-backend yzbhc-nginx >/dev/null 2>&1 || true; echo "--- Recreating backend/nginx with pulled images ---"; sudo docker compose -f "$COMPOSE_FILE" up -d --force-recreate backend nginx; echo "--- Running image refs ---"; sudo docker inspect yzbhc-backend --format "{{.Config.Image}}"; sudo docker inspect yzbhc-nginx --format "{{.Config.Image}}"; echo "--- Removing unused images ---"; sudo docker image prune -af >/dev/null 2>&1 || true; echo "--- Deploy complete ---"'
          sshpass -p "$PASSWORD" ssh -o StrictHostKeyChecking=no "$USERNAME@$HOST" GHCR_TOKEN="$GHCR_TOKEN" GHCR_USERNAME="$GHCR_USERNAME" bash -lc "$REMOTE_CMD"
          echo "Server deployment triggered successfully"

      - name: Verify deployment
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: 22
          script: |
            echo "=== Container status ==="
            sudo docker compose -f /home/yzb/docker-compose.yml ps

            echo ""
            echo "=== Running image refs ==="
            sudo docker inspect yzbhc-backend --format '{{.Config.Image}}'
            sudo docker inspect yzbhc-nginx --format '{{.Config.Image}}'

            echo ""
            echo "=== Backend mounts ==="
            sudo docker inspect yzbhc-backend --format '{{json .Mounts}}'

            echo ""
            echo "=== Backend recent logs ==="
            sudo docker logs --tail=30 yzbhc-backend

            echo ""
            echo "=== Nginx connectivity check ==="
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/ || echo "failed")
            echo "HTTP status: $STATUS"

            echo ""
            echo "=== Database unique_code column check ==="
            DB_PWD=$(sudo docker inspect yzbhc-mysql --format '{{range .Config.Env}}{{println .}}{{end}}' | sed -n 's/^MYSQL_ROOT_PASSWORD=//p')
            HAS_COL=$(sudo docker exec yzbhc-mysql mysql -uroot -p"$DB_PWD" -Nse "SELECT COUNT(*) FROM information_schema.columns WHERE table_schema='yzb' AND table_name='scm_inventory' AND column_name='unique_code'" 2>/dev/null)
            if [ "$HAS_COL" = "1" ]; then
              echo "unique_code column: OK"
            else
              echo "unique_code column: MISSING (migration may be needed)"
            fi

      - name: Notify on failure
        if: ${{ failure() }}
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          if [ -z "$DINGTALK_WEBHOOK" ]; then
            echo "DINGTALK_WEBHOOK not configured, skip notification"
            exit 0
          fi
          curl -s -X POST "$DINGTALK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"❌ 部署失败\",
                \"text\": \"### ❌ 部署失败\n\n- **仓库**: ${{ github.repository }}\n- **分支**: ${{ github.ref_name }}\n- **提交**: ${{ github.sha }}\n- **触发人**: ${{ github.triggering_actor }}\n- **时间**: $(date '+%Y-%m-%d %H:%M:%S')\n\n请查看 [Action 日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"
              }
            }"
